<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理科テスト対策 | 向丘中 2年</title>
<style>
  :root {
    --bg: #0f1923;
    --surface: #1a2840;
    --surface2: #243352;
    --accent: #38b2e8;
    --accent2: #f97316;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8f0f8;
    --muted: #7a96b8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* ===== TOP ===== */
  #top-screen { display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; min-height: 100vh; }
  .app-header { text-align: center; margin-bottom: 28px; }
  .app-header .school-label { font-size: 11px; letter-spacing: .12em; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .app-header h1 { font-size: 22px; font-weight: 800; line-height: 1.3; background: linear-gradient(135deg, var(--accent), #7dd3fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .app-header .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .stage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 480px; }
  .stage-card { background: var(--surface); border: 1.5px solid var(--surface2); border-radius: var(--radius); padding: 16px 14px; cursor: pointer; transition: transform .15s, border-color .15s; position: relative; overflow: hidden; }
  .stage-card:active { transform: scale(.97); }
  .stage-card:hover { border-color: var(--accent); }
  .stage-card.cleared { border-color: var(--correct); }
  .stage-card.cleared::after { content: '✓ クリア'; position: absolute; top: 8px; right: 8px; font-size: 10px; color: var(--correct); font-weight: 700; }
  .stage-num { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: .08em; }
  .stage-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .stage-icon { font-size: 22px; margin-bottom: 6px; }
  .stage-count { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .stage-card.priority .stage-name { color: var(--accent2); }
  .stage-card.priority { border-color: #7c3a1a; }

  /* ===== QUIZ ===== */
  #quiz-screen { display: none; flex-direction: column; min-height: 100vh; }
  .quiz-header { background: var(--surface); padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .back-btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .quiz-title-bar { flex: 1; }
  .quiz-title-bar .stage-label { font-size: 11px; color: var(--muted); }
  .quiz-title-bar .stage-title { font-size: 15px; font-weight: 700; }
  .score-badge { background: var(--surface2); border-radius: 20px; padding: 4px 12px; font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .progress-bar-wrap { height: 4px; background: var(--surface2); }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #7dd3fc); transition: width .3s; }

  /* streak */
  .streak-bar { padding: 6px 16px; min-height: 32px; display: flex; align-items: center; }
  .streak-badge { background: #7c2d00; border-radius: 20px; padding: 3px 12px; font-size: 13px; font-weight: 700; color: #fed7aa; display: inline-block; animation: popIn .25s ease; }
  @keyframes popIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .quiz-body { flex: 1; padding: 16px 16px 40px; max-width: 560px; margin: 0 auto; width: 100%; }
  .q-counter { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .q-text { font-size: 18px; font-weight: 700; line-height: 1.6; margin-bottom: 24px; min-height: 60px; }
  .choices { display: flex; flex-direction: column; gap: 12px; }
  .choice-btn { background: var(--surface); border: 2px solid var(--surface2); border-radius: var(--radius); padding: 16px 18px; font-size: 16px; font-weight: 600; color: var(--text); cursor: pointer; text-align: left; transition: border-color .12s, background .12s; line-height: 1.4; }
  .choice-btn:active { opacity: .85; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { border-color: var(--correct); background: #14301f; color: var(--correct); }
  .choice-btn.wrong   { border-color: var(--wrong); background: #2d1010; color: var(--wrong); }

  .feedback-box { margin-top: 20px; background: var(--surface); border-radius: var(--radius); padding: 16px; border-left: 4px solid var(--accent); display: none; }
  .feedback-box.show { display: block; }
  .feedback-result { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .feedback-result.ok { color: var(--correct); }
  .feedback-result.ng { color: var(--wrong); }
  .correct-answer-line { font-size: 14px; color: #fde68a; font-weight: 700; margin-bottom: 8px; }
  .feedback-label { font-size: 11px; color: var(--muted); letter-spacing: .08em; margin-top: 10px; margin-bottom: 2px; }
  .feedback-explain { font-size: 14px; line-height: 1.7; color: #c8ddf0; }
  .feedback-comment { font-size: 13px; line-height: 1.6; color: #fde68a; margin-top: 4px; font-style: italic; }

  .next-btn { display: none; width: 100%; margin-top: 16px; background: var(--accent); border: none; border-radius: var(--radius); padding: 16px; font-size: 17px; font-weight: 800; color: #fff; cursor: pointer; transition: opacity .15s; }
  .next-btn:active { opacity: .8; }
  .next-btn.show { display: block; }

  /* ===== RESULT ===== */
  #result-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; }
  .result-emoji { font-size: 72px; margin-bottom: 12px; }
  .result-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .result-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; text-align: center; }
  .result-score-big { font-size: 56px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .result-score-label { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  .result-pct { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
  .result-msg { background: var(--surface); border-radius: var(--radius); padding: 16px 20px; font-size: 15px; line-height: 1.7; text-align: center; max-width: 400px; width: 100%; margin-bottom: 24px; }
  .result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .r-btn { border-radius: var(--radius); padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: opacity .15s; }
  .r-btn:active { opacity: .8; }
  .r-btn.primary { background: var(--accent); color: #fff; }
  .r-btn.secondary { background: var(--surface); color: var(--text); border: 2px solid var(--surface2); }
  .r-btn.review { background: var(--accent2); color: #fff; }

  /* ===== REVIEW MODE ===== */
  .review-badge { background: var(--accent2); border-radius: 20px; padding: 3px 14px; font-size: 12px; font-weight: 700; color: #fff; display: inline-block; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- TOP -->
<div id="top-screen">
  <div class="app-header">
    <div class="school-label">向丘中学校 2年 中間テスト対策</div>
    <h1>理科 クイズアプリ</h1>
    <div class="sub">全9ステージ ／ 80%以上でクリア</div>
  </div>
  <div class="stage-grid" id="stage-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goTop()">‹</button>
    <div class="quiz-title-bar">
      <div class="stage-label" id="ql-stage"></div>
      <div class="stage-title" id="ql-title"></div>
    </div>
    <div class="score-badge" id="ql-score">0 / 0</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="streak-bar" id="streak-bar"></div>
  <div class="quiz-body">
    <div class="q-counter" id="q-counter"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-result" id="fb-result"></div>
      <div class="correct-answer-line" id="fb-correct-line"></div>
      <div class="feedback-label">解説</div>
      <div class="feedback-explain" id="fb-explain"></div>
      <div class="feedback-label">先生コメント</div>
      <div class="feedback-comment" id="fb-comment"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-title" id="res-title"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-score-big" id="res-score-big"></div>
  <div class="result-score-label" id="res-score-label"></div>
  <div class="result-pct" id="res-pct"></div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-btns">
    <button class="r-btn review" id="review-btn" onclick="startReview()" style="display:none">📝 間違えた問題を復習</button>
    <button class="r-btn primary" onclick="retryStage()">もう一度</button>
    <button class="r-btn secondary" onclick="goTop()">ステージ選択</button>
  </div>
</div>

<script>
// =============================================
// コメント定数
// =============================================
const PRAISE = ["その調子！","よく覚えていたね！","テストでも出やすいぞ！","1点ゲット！","ここは必ず取ろう！","いい感じ！","完璧！","さすが！"];
const ENCOURAGE = ["ここは覚えよう！","まだ大丈夫！","次で取り返そう！","理科は暗記で伸びる！","よく出る用語だよ！","もう一回解こう！","ここが山場！","覚えれば点になる！"];

// =============================================
// 問題データ（ChatGPT作成 - 変更禁止）
// =============================================
const stage1 = [
{question:"地表の岩石が長い時間をかけてくずれる現象を何という？",choices:["侵食","風化","運搬","堆積"],answer:1,explanation:"岩石が気温変化や水などによってくずれる現象を風化という。",comment:"まずは基本用語を覚えよう！"},
{question:"川の流れによって土砂が削り取られるはたらきを何という？",choices:["風化","運搬","侵食","堆積"],answer:2,explanation:"川や波が地面を削るはたらきを侵食という。",comment:"風化→侵食→運搬→堆積の順番が重要！"},
{question:"川が土砂を下流へ運ぶはたらきを何という？",choices:["運搬","堆積","侵食","風化"],answer:0,explanation:"土砂を運ぶはたらきを運搬という。",comment:"テスト頻出！"},
{question:"運ばれた土砂が積もることを何という？",choices:["侵食","堆積","風化","運搬"],answer:1,explanation:"土砂が積もることを堆積という。",comment:"あと一歩で地層完成！"},
{question:"粒の大きさが最も大きいものはどれ？",choices:["泥","砂","れき","火山灰"],answer:2,explanation:"れき→砂→泥の順に粒が大きい。",comment:"粒の大きさは超重要！"},
{question:"粒の大きさが最も小さいものはどれ？",choices:["れき","砂","泥","小石"],answer:2,explanation:"泥が最も細かい粒でできている。",comment:"よく出るぞ！"},
{question:"れきが固まってできた岩石を何という？",choices:["泥岩","砂岩","石灰岩","れき岩"],answer:3,explanation:"れきが固まるとれき岩になる。",comment:"岩石名は必ず覚えよう！"},
{question:"砂が固まってできた岩石を何という？",choices:["砂岩","泥岩","れき岩","凝灰岩"],answer:0,explanation:"砂が固まると砂岩になる。",comment:"定番問題！"},
{question:"泥が固まってできた岩石を何という？",choices:["砂岩","泥岩","れき岩","石灰岩"],answer:1,explanation:"泥が固まると泥岩になる。",comment:"1点問題だよ！"},
{question:"火山灰が固まってできた岩石は？",choices:["れき岩","泥岩","凝灰岩","砂岩"],answer:2,explanation:"火山灰が固まると凝灰岩になる。",comment:"火山ともつながる内容！"},
{question:"地層の重なり方を柱のように表した図を何という？",choices:["地質図","柱状図","地層図","断面図"],answer:1,explanation:"地層の厚さや重なり方を示した図を柱状図という。",comment:"資料問題でよく出る！"},
{question:"同じ時期に広い範囲で積もった地層を見分ける手がかりとなる地層を何という？",choices:["示準化石","示相化石","鍵層","断層"],answer:2,explanation:"広い範囲で見られる特徴的な地層を鍵層という。",comment:"凝灰岩は鍵層になりやすい！"},
{question:"海面が上昇したり土地が沈降したりして海が陸地へ広がる現象を何という？",choices:["海退","海進","隆起","断層"],answer:1,explanation:"海が陸へ広がる現象を海進という。",comment:"海進と海退はセットで覚える！"},
{question:"海面が下がったり土地が隆起したりして海が後退する現象を何という？",choices:["海進","海底拡大","海退","侵食"],answer:2,explanation:"海が沖へ後退する現象を海退という。",comment:"海進の反対！"},
{question:"土地がゆっくり高くなる現象を何という？",choices:["沈降","侵食","隆起","風化"],answer:2,explanation:"土地が高くなることを隆起という。",comment:"漢字も書けるように！"},
{question:"土地がゆっくり低くなる現象を何という？",choices:["隆起","風化","沈降","運搬"],answer:2,explanation:"土地が低くなることを沈降という。",comment:"海進の原因になることもある！"},
{question:"海底で最も沖合に堆積しやすいものはどれ？",choices:["れき","砂","泥","小石"],answer:2,explanation:"細かい泥ほど遠くまで運ばれる。",comment:"粒が小さいほど遠くへ！"},
{question:"海岸近くに堆積しやすいものはどれ？",choices:["泥","砂","れき","火山灰"],answer:2,explanation:"重いれきは遠くまで運ばれにくい。",comment:"粒が大きいほど手前！"},
{question:"地層は一般的にどちらが古い？",choices:["上の地層","下の地層","同じ","わからない"],answer:1,explanation:"地層は下ほど古く、上ほど新しい。",comment:"超頻出！"},
{question:"地層ができる主な場所はどこ？",choices:["空中","海や湖の底","山の頂上","建物の中"],answer:1,explanation:"地層は海や湖の底などで堆積してできる。",comment:"最後も基本問題！"}
];

const stage2 = [
{question:"地層が堆積した年代を知る手がかりになる化石を何という？",choices:["示相化石","示準化石","標準化石","年代化石"],answer:1,explanation:"地層の年代を知る手がかりになる化石を示準化石という。",comment:"示準化石＝年代！"},
{question:"地層が堆積した当時の環境を知る手がかりになる化石を何という？",choices:["示準化石","示相化石","環境化石","時代化石"],answer:1,explanation:"当時の環境を知る手がかりになる化石を示相化石という。",comment:"示相化石＝環境！"},
{question:"アンモナイトは、主にどの時代を示す示準化石？",choices:["古生代","中生代","新生代","現代"],answer:1,explanation:"アンモナイトは中生代を代表する示準化石。",comment:"アンモナイト＝中生代！"},
{question:"三葉虫は、主にどの時代を示す示準化石？",choices:["古生代","中生代","新生代","現代"],answer:0,explanation:"三葉虫は古生代を代表する示準化石。",comment:"三葉虫＝古生代！"},
{question:"フズリナは、主にどの時代を示す示準化石？",choices:["古生代","中生代","新生代","現代"],answer:0,explanation:"フズリナは古生代を代表する示準化石。",comment:"フズリナも古生代！"},
{question:"ビカリアは、主にどの時代を示す示準化石？",choices:["古生代","中生代","新生代","現代"],answer:2,explanation:"ビカリアは新生代を代表する示準化石。",comment:"ビカリア＝新生代！"},
{question:"サンゴの化石からわかる環境として正しいものはどれ？",choices:["冷たく深い海","暖かく浅い海","火山の近く","乾燥した砂漠"],answer:1,explanation:"サンゴは暖かく浅い海にすむため、当時の環境がわかる。",comment:"サンゴ＝暖かく浅い海！"},
{question:"シジミの化石からわかる環境として正しいものはどれ？",choices:["湖や河口付近","深い海","火山の火口","氷河"],answer:0,explanation:"シジミは湖や河口付近などにすむ生物。",comment:"シジミ＝湖・河口！"},
{question:"示準化石として適している生物の特徴はどれ？",choices:["長い時代にわたり少数いた","短い時代に広い範囲にいた","狭い地域だけにいた","化石になりにくい"],answer:1,explanation:"示準化石は、短い時代に広い範囲に生息していた生物が適している。",comment:"短い時代・広い範囲！"},
{question:"示相化石として適している生物の特徴はどれ？",choices:["すむ環境が決まっている","どこにでもすむ","時代が短い","空を飛ぶ"],answer:0,explanation:"示相化石は、すむ環境が決まっている生物が適している。",comment:"環境が決まっている生物！"},
{question:"アンモナイトの化石が見つかった地層は、どの時代の地層と考えられる？",choices:["古生代","中生代","新生代","未来"],answer:1,explanation:"アンモナイトは中生代を示す化石なので、その地層は中生代と考えられる。",comment:"アンモナイトを見たら中生代！"},
{question:"三葉虫の化石が見つかった地層は、どの時代の地層と考えられる？",choices:["古生代","中生代","新生代","現代"],answer:0,explanation:"三葉虫は古生代を示す化石。",comment:"三葉虫はかなり古い！"},
{question:"ビカリアの化石が見つかった地層は、どの時代の地層と考えられる？",choices:["古生代","中生代","新生代","現代"],answer:2,explanation:"ビカリアは新生代を示す化石。",comment:"ビカリア＝新しい時代！"},
{question:"フズリナと同じ時代を示す化石はどれ？",choices:["アンモナイト","ビカリア","三葉虫","ナウマンゾウ"],answer:2,explanation:"フズリナと三葉虫はどちらも古生代を示す。",comment:"古生代コンビ！"},
{question:"アンモナイトと同じ時代を示すものとして正しいものはどれ？",choices:["恐竜","ビカリア","三葉虫","フズリナ"],answer:0,explanation:"恐竜は中生代に栄えた生物。",comment:"中生代＝恐竜の時代！"},
{question:"サンゴの化石は、示準化石と示相化石のどちらにあたる？",choices:["示準化石","示相化石","どちらでもない","火山化石"],answer:1,explanation:"サンゴは当時の環境を知る手がかりになるため示相化石。",comment:"サンゴは環境を示す！"},
{question:"アンモナイトの化石は、示準化石と示相化石のどちらにあたる？",choices:["示準化石","示相化石","どちらでもない","環境化石"],answer:0,explanation:"アンモナイトは地層の年代を知る手がかりになるため示準化石。",comment:"アンモナイトは年代！"},
{question:"地層から化石が見つかると、何がわかることがある？",choices:["天気だけ","地層の年代や環境","地震の震度だけ","電流の大きさ"],answer:1,explanation:"化石から、地層ができた年代や当時の環境を推定できる。",comment:"化石は情報の宝庫！"},
{question:"古い順に正しく並んでいるものはどれ？",choices:["古生代→中生代→新生代","中生代→古生代→新生代","新生代→中生代→古生代","古生代→新生代→中生代"],answer:0,explanation:"地質年代は、古生代→中生代→新生代の順。",comment:"古・中・新で覚えよう！"},
{question:"恐竜とアンモナイトが栄えた時代はどれ？",choices:["古生代","中生代","新生代","先カンブリア時代"],answer:1,explanation:"恐竜やアンモナイトは中生代に栄えた。",comment:"中生代は超頻出！"}
];

const STAGES = [
  {id:1, name:"地層編",       icon:"🪨", priority:false, data:stage1},
  {id:2, name:"化石編",       icon:"🦕", priority:true,  data:stage2},
  {id:3, name:"地震編",       icon:"🌏", priority:true,  data:stage3},
  {id:4, name:"火山・岩石編", icon:"🌋", priority:true,  data:stage4},
  {id:5, name:"プレート編",   icon:"🗺️", priority:false, data:stage5},
  {id:6, name:"電流基礎編",   icon:"⚡", priority:false, data:stage6},
  {id:7, name:"オームの法則", icon:"🔢", priority:true,  data:stage7},
  {id:8, name:"合成抵抗編",   icon:"🔌", priority:false, data:stage8},
  {id:9, name:"向丘中 予想問題",icon:"📝",priority:false, data:stage9}
];

// =============================================
// State
// =============================================
let currentStage = null;
let questions = [];
let qIndex = 0;
let score = 0;
let streak = 0;
let answered = false;
let wrongQuestions = [];
let isReviewMode = false;
const clearedStages = new Set(JSON.parse(localStorage.getItem('clearedStagesV2') || '[]'));

// =============================================
// Utils
// =============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function show(id) {
  ['top-screen','quiz-screen','result-screen'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
}

// =============================================
// Top Screen
// =============================================
function renderTop() {
  const grid = document.getElementById('stage-grid');
  grid.innerHTML = '';
  STAGES.forEach((stage, i) => {
    const cleared = clearedStages.has(stage.id);
    const card = document.createElement('div');
    card.className = 'stage-card' + (cleared ? ' cleared' : '') + (stage.priority ? ' priority' : '');
    card.innerHTML = `
      <div class="stage-icon">${stage.icon}</div>
      <div class="stage-num">STAGE ${stage.id}</div>
      <div class="stage-name">${stage.name}</div>
      <div class="stage-count">${stage.data.length}問 / クリア80%以上</div>
    `;
    card.onclick = () => startStage(i);
    grid.appendChild(card);
  });
}

// =============================================
// Quiz
// =============================================
function startStage(idx, reviewList) {
  currentStage = idx;
  isReviewMode = !!reviewList;
  questions = isReviewMode ? shuffle(reviewList) : shuffle([...STAGES[idx].data]);
  qIndex = 0;
  score = 0;
  streak = 0;
  wrongQuestions = [];
  answered = false;
  show('quiz-screen');
  document.getElementById('ql-stage').textContent = isReviewMode ? '復習モード' : `STAGE ${STAGES[idx].id}`;
  document.getElementById('ql-title').textContent = STAGES[idx].name;
  document.getElementById('streak-bar').innerHTML = '';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[qIndex];
  answered = false;

  const total = questions.length;
  document.getElementById('q-counter').textContent = `問題 ${qIndex + 1} / ${total}`;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('ql-score').textContent = `${score} / ${qIndex}`;
  document.getElementById('prog-fill').style.width = `${(qIndex / total) * 100}%`;

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  document.getElementById('next-btn').className = 'next-btn';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  const indices = shuffle([0,1,2,3]);
  indices.forEach(ci => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = q.choices[ci];
    btn.dataset.ci = ci;
    btn.onclick = () => selectAnswer(ci, q);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(selected, q) {
  if (answered) return;
  answered = true;

  const correct = q.answer;
  const ok = selected === correct;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const ci = parseInt(btn.dataset.ci);
    if (ci === correct) btn.classList.add('correct');
    else if (ci === selected && !ok) btn.classList.add('wrong');
  });

  if (ok) {
    score++;
    streak++;
  } else {
    wrongQuestions.push(q);
    streak = 0;
  }

  // streak表示
  const streakBar = document.getElementById('streak-bar');
  if (streak >= 3) {
    streakBar.innerHTML = `<span class="streak-badge">🔥 ${streak}連続正解！</span>`;
  } else {
    streakBar.innerHTML = '';
  }

  // フィードバック表示
  const fb = document.getElementById('feedback-box');
  const fbRes = document.getElementById('fb-result');
  const fbCorrectLine = document.getElementById('fb-correct-line');
  const fbExplain = document.getElementById('fb-explain');
  const fbComment = document.getElementById('fb-comment');

  if (ok) {
    fbRes.textContent = '⭕ 正解！';
    fbRes.className = 'feedback-result ok';
    fbCorrectLine.textContent = '';
  } else {
    fbRes.textContent = '❌ 残念！';
    fbRes.className = 'feedback-result ng';
    fbCorrectLine.textContent = `正解： ${q.choices[correct]}`;
  }

  fbExplain.textContent = q.explanation;
  fbComment.textContent = q.comment || rand(ok ? PRAISE : ENCOURAGE);
  fb.className = 'feedback-box show';
  document.getElementById('next-btn').className = 'next-btn show';
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= questions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

// =============================================
// Result
// =============================================
function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const cleared = pct >= 80;
  const perfect = pct === 100;

  if (cleared && !isReviewMode) {
    clearedStages.add(STAGES[currentStage].id);
    localStorage.setItem('clearedStagesV2', JSON.stringify([...clearedStages]));
  }

  show('result-screen');

  let emoji, title;
  if (perfect) {
    emoji = '🏆'; title = 'PERFECT!!';
  } else if (cleared) {
    emoji = '🎉'; title = 'STAGE CLEAR！';
  } else if (pct >= 60) {
    emoji = '😊'; title = 'もう少し！';
  } else {
    emoji = '📚'; title = 'チャレンジ！';
  }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = `${STAGES[currentStage].name} ／ ${isReviewMode ? '復習モード' : ''}`;
  document.getElementById('res-score-big').textContent = score;
  document.getElementById('res-score-label').textContent = `/ ${total}問正解`;
  document.getElementById('res-pct').textContent = `正答率 ${pct}％`;

  let msg = '';
  if (perfect) {
    msg = '満点達成！定期テストでも狙えるぞ！先生もびっくり！';
  } else if (cleared) {
    msg = `よく頑張った！次のステージへ進もう！`;
  } else if (pct >= 60) {
    msg = `あと少しでクリア！間違えた問題を復習してもう一度チャレンジしよう！`;
  } else {
    msg = `解説をよく読んで、もう一度チャレンジしてみよう！理科は暗記で伸びる！`;
  }
  document.getElementById('res-msg').textContent = msg;

  const reviewBtn = document.getElementById('review-btn');
  if (wrongQuestions.length > 0 && !isReviewMode) {
    reviewBtn.style.display = 'inline-block';
    reviewBtn.textContent = `📝 間違えた問題を復習（${wrongQuestions.length}問）`;
  } else {
    reviewBtn.style.display = 'none';
  }
}

function startReview() {
  startStage(currentStage, wrongQuestions);
}

function retryStage() {
  startStage(currentStage);
}

function goTop() {
  renderTop();
  show('top-screen');
}

// =============================================
// Init
// =============================================
renderTop();
show('top-screen');
</script>
</body>
</html>
