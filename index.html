<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理科テスト対策 | 向丘中 2年</title>
<style>
  :root {
    --bg: #0f1923;
    --surface: #1a2840;
    --surface2: #243352;
    --accent: #38b2e8;
    --accent2: #f97316;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8f0f8;
    --muted: #7a96b8;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== TOP ===== */
  #top-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    min-height: 100vh;
  }

  .app-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .app-header .school-label {
    font-size: 11px;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .app-header h1 {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.3;
    background: linear-gradient(135deg, var(--accent), #7dd3fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .app-header .sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .stage-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }

  .stage-card {
    background: var(--surface);
    border: 1.5px solid var(--surface2);
    border-radius: var(--radius);
    padding: 16px 14px;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
    position: relative;
    overflow: hidden;
  }

  .stage-card:active { transform: scale(.97); }
  .stage-card:hover { border-color: var(--accent); }

  .stage-card.cleared { border-color: var(--correct); }
  .stage-card.cleared::after {
    content: '✓ クリア';
    position: absolute;
    top: 8px; right: 8px;
    font-size: 10px;
    color: var(--correct);
    font-weight: 700;
  }

  .stage-num {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: .08em;
  }

  .stage-name {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }

  .stage-icon {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .stage-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .stage-card.priority .stage-name { color: var(--accent2); }
  .stage-card.priority { border-color: #7c3a1a; }

  /* ===== QUIZ ===== */
  #quiz-screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 0;
  }

  .quiz-header {
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  .quiz-title-bar {
    flex: 1;
  }

  .quiz-title-bar .stage-label {
    font-size: 11px;
    color: var(--muted);
  }

  .quiz-title-bar .stage-title {
    font-size: 15px;
    font-weight: 700;
  }

  .score-badge {
    background: var(--surface2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--surface2);
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #7dd3fc);
    transition: width .3s;
  }

  .quiz-body {
    flex: 1;
    padding: 20px 16px;
    max-width: 560px;
    margin: 0 auto;
    width: 100%;
  }

  .q-counter {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 24px;
    min-height: 64px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice-btn {
    background: var(--surface);
    border: 2px solid var(--surface2);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: border-color .12s, background .12s;
    line-height: 1.4;
  }

  .choice-btn:active { opacity: .85; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { border-color: var(--correct); background: #14301f; color: var(--correct); }
  .choice-btn.wrong   { border-color: var(--wrong); background: #2d1010; color: var(--wrong); }

  .feedback-box {
    margin-top: 20px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border-left: 4px solid var(--accent);
    display: none;
  }

  .feedback-box.show { display: block; }
  .feedback-result {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .feedback-result.ok { color: var(--correct); }
  .feedback-result.ng { color: var(--wrong); }
  .feedback-explain {
    font-size: 14px;
    line-height: 1.7;
    color: #c8ddf0;
  }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 16px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    transition: opacity .15s;
  }
  .next-btn:active { opacity: .8; }
  .next-btn.show { display: block; }

  /* ===== RESULT ===== */
  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
  }

  .result-emoji { font-size: 64px; margin-bottom: 12px; }
  .result-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .result-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

  .result-score-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 8px solid var(--surface2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin-bottom: 28px;
    position: relative;
  }

  .result-score-ring .score-num {
    font-size: 48px; font-weight: 900;
    line-height: 1;
  }
  .result-score-ring .score-denom {
    font-size: 14px; color: var(--muted);
  }

  .result-msg {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 15px;
    line-height: 1.7;
    text-align: center;
    max-width: 400px;
    margin-bottom: 24px;
  }

  .result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .r-btn {
    border-radius: var(--radius);
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity .15s;
  }
  .r-btn:active { opacity: .8; }
  .r-btn.primary { background: var(--accent); color: #fff; }
  .r-btn.secondary { background: var(--surface); color: var(--text); border: 2px solid var(--surface2); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- TOP -->
<div id="top-screen">
  <div class="app-header">
    <div class="school-label">向丘中学校 2年 中間テスト対策</div>
    <h1>理科 クイズアプリ</h1>
    <div class="sub">全9ステージ・各20問 ／ 80%以上でクリア</div>
  </div>

  <div class="stage-grid" id="stage-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goTop()">‹</button>
    <div class="quiz-title-bar">
      <div class="stage-label" id="ql-stage"></div>
      <div class="stage-title" id="ql-title"></div>
    </div>
    <div class="score-badge" id="ql-score">0 / 0</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="quiz-body">
    <div class="q-counter" id="q-counter"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-result" id="fb-result"></div>
      <div class="feedback-explain" id="fb-explain"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-title" id="res-title"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-score-ring">
    <div class="score-num" id="res-score-num"></div>
    <div class="score-denom" id="res-score-denom"></div>
  </div>
  <div class="result-msg" id="res-msg"></div>
  <div class="result-btns">
    <button class="r-btn primary" onclick="retryStage()">もう一度</button>
    <button class="r-btn secondary" onclick="goTop()">ステージ選択</button>
  </div>
</div>

<script>
// =============================================
// 問題データベース（全9ステージ）
// =============================================
const STAGES = [
  {
    id: 1,
    name: "地層編",
    icon: "🪨",
    priority: false,
    questions: [
      {q:"岩石が長い年月をかけて砕かれ、もろくなる現象を何という？",choices:["風化","侵食","堆積","運搬"],ans:0,ex:"風化とは、気温の変化や水などによって岩石が表面からもろくなる現象です。侵食・運搬・堆積とセットで覚えましょう。"},
      {q:"川の流れや風が岩石や地面を削る働きを何という？",choices:["堆積","運搬","侵食","風化"],ans:2,ex:"侵食とは、水や風が地面や岩石を削り取る働きです。川の上流で特に強く起こります。"},
      {q:"川が土砂などを流し運ぶ働きを何という？",choices:["堆積","運搬","侵食","風化"],ans:1,ex:"運搬とは、侵食で削られた土砂などを流れが運ぶ働きです。川の中流で主に起こります。"},
      {q:"土砂などが水底に積もる働きを何という？",choices:["侵食","運搬","風化","堆積"],ans:3,ex:"堆積とは、運ばれてきた土砂が水底に積み重なることです。川の下流や海底で起こります。"},
      {q:"粒の直径が2mm以上のものを何という？",choices:["泥","砂","れき","凝灰岩"],ans:2,ex:"れき（礫）は直径2mm以上の粒です。砂は0.06～2mm、泥は0.06mm以下です。"},
      {q:"粒の直径が0.06mm以下のものを何という？",choices:["砂","れき","泥","土"],ans:2,ex:"泥は粒径0.06mm以下の細かい粒です。水に流されやすく、沖合の深い海底に積もります。"},
      {q:"地層が水平方向に連続しているとき、同じ高さの層は同時期に堆積したと考える法則を何という？",choices:["地層の法則","地層同定の原理","示準化石の法則","地層累重の法則"],ans:3,ex:"地層累重の法則とは、下の地層ほど古く、上の地層ほど新しいという法則です。"},
      {q:"離れた地点の地層を比べるために用いる柱状の図を何という？",choices:["地質図","断面図","柱状図","地形図"],ans:2,ex:"柱状図とは、ボーリング調査で得た地層の重なりを棒状に表した図です。離れた地点の地層を対比するのに使います。"},
      {q:"れきが固まってできた岩石を何という？",choices:["砂岩","泥岩","凝灰岩","れき岩"],ans:3,ex:"れき岩はれき（直径2mm以上）が固まった岩石です。砂→砂岩、泥→泥岩と覚えましょう。"},
      {q:"砂が固まってできた岩石を何という？",choices:["泥岩","れき岩","砂岩","花こう岩"],ans:2,ex:"砂岩は砂（0.06～2mm）が固まった岩石です。表面がざらざらしています。"},
      {q:"泥が固まってできた岩石を何という？",choices:["砂岩","れき岩","泥岩","安山岩"],ans:2,ex:"泥岩は泥（0.06mm以下）が固まった岩石です。表面がなめらかです。"},
      {q:"火山灰が固まってできた岩石を何という？",choices:["砂岩","泥岩","れき岩","凝灰岩"],ans:3,ex:"凝灰岩は火山灰が堆積して固まった岩石です。鍵層として地層の対比に使われます。"},
      {q:"離れた場所の地層を比較するための目印となる層を何という？",choices:["示準層","基準層","鍵層","対比層"],ans:2,ex:"鍵層とは、広範囲に同時期に堆積した目立つ層のことです。凝灰岩の層がよく使われます。"},
      {q:"粒が大きいほど、海の浅い・深いどちらに積もる？",choices:["深い海","沖合","浅い海","川底"],ans:2,ex:"粒が大きいほど重くて早く沈むため、浅い海（海岸近く）に積もります。沖に行くほど細かい泥が積もります。"},
      {q:"地層が海側に沈み込むことを何という？",choices:["隆起","海進","海退","沈降"],ans:3,ex:"沈降とは、地層が下がること（沈む）です。海岸線が内陸に向かって広がる海進が起こります。"},
      {q:"地層が陸側に持ち上がることを何という？",choices:["沈降","海進","海退","侵食"],ans:0,ex:"隆起とは、地層が上に持ち上がることです。海岸線が後退する海退が起こります。"},
      {q:"陸地が水没して海が広がる現象を何という？",choices:["海退","隆起","沈降","海進"],ans:3,ex:"海進とは、地盤の沈降などによって海岸線が陸側に移動し、海の範囲が広がることです。"},
      {q:"海が後退して陸地が広がる現象を何という？",choices:["海進","海退","沈降","堆積"],ans:1,ex:"海退とは、地盤の隆起などによって海岸線が海側に移動し、陸地が広がることです。"},
      {q:"柱状図で、同じ種類の地層がどの地点にもあれば何がわかる？",choices:["地層の色","同時期に堆積したこと","化石の種類","粒の大きさ"],ans:1,ex:"柱状図の同じ地層（鍵層など）を対比することで、離れた地点でも同じ時代に堆積したことがわかります。"},
      {q:"川の上流・下流、どちらに大きな粒が多い？",choices:["下流","河口","上流","海底"],ans:2,ex:"上流は流れが速く侵食が強いため、大きなれきが多いです。下流に行くほど小さな砂や泥になります。"}
    ]
  },
  {
    id: 2,
    name: "化石編",
    icon: "🦕",
    priority: true,
    questions: [
      {q:"地層が堆積した年代を知るための化石を何という？",choices:["示相化石","鍵化石","示準化石","地質化石"],ans:2,ex:"示準化石とは、地層の年代（時代）を決めるための化石です。短期間だけ栄えて広い範囲に分布した生物が使われます。"},
      {q:"地層が堆積した当時の環境を知るための化石を何という？",choices:["示準化石","示相化石","鍵化石","環境化石"],ans:1,ex:"示相化石とは、地層ができた当時の環境（気候・水深など）を知るための化石です。特定の環境にしか生きられなかった生物が使われます。"},
      {q:"中生代を代表する示準化石は？",choices:["三葉虫","フズリナ","アンモナイト","ビカリア"],ans:2,ex:"アンモナイトは中生代（約2億5千万年前〜約6600万年前）の示準化石です。海に広く生息していました。"},
      {q:"古生代を代表する示準化石は？（2つあるが1つ選べ）",choices:["アンモナイト","ビカリア","サンゴ","三葉虫"],ans:3,ex:"三葉虫は古生代を代表する示準化石です。フズリナも古生代の示準化石として重要です。"},
      {q:"フズリナが生きていたのはいつの時代？",choices:["新生代","中生代","古生代","原生代"],ans:2,ex:"フズリナ（紡錘虫）は古生代に生きた海の生物です。石灰岩の中によく見つかります。"},
      {q:"新生代を代表する示準化石は？",choices:["アンモナイト","三葉虫","フズリナ","ビカリア"],ans:3,ex:"ビカリア（巻き貝の仲間）は新生代の示準化石です。日本でも各地で発見されています。"},
      {q:"サンゴは示準化石・示相化石のどちら？",choices:["示準化石","どちらでもない","示相化石","鍵化石"],ans:2,ex:"サンゴは示相化石です。現在のサンゴと同様に、暖かく浅い海に生息していたことがわかります。"},
      {q:"サンゴの化石が見つかった地層は、どんな環境だったとわかる？",choices:["冷たく深い海","暖かく浅い海","淡水の川","砂漠"],ans:1,ex:"サンゴは暖かく浅い海に生息します。サンゴの化石が出た地層は、当時暖かく浅い海だったことがわかります。"},
      {q:"シジミの化石が見つかった地層は、どんな環境だったとわかる？",choices:["深海","暖かい海","湖や河口（汽水域）","砂漠"],ans:2,ex:"シジミは淡水〜汽水（海水と淡水が混じる）に生息します。シジミの化石は湖や川の河口付近だったことを示します。"},
      {q:"示準化石として適切な生物の条件は？",choices:["狭い範囲に長期間生きた","広い範囲に短期間生きた","深海のみに生きた","陸上だけに生きた"],ans:1,ex:"示準化石には「広い範囲に分布」し「短期間だけ栄えた」生物が適しています。これで地層の年代を限定できます。"},
      {q:"アンモナイトは何の仲間？",choices:["魚類","三葉虫の近縁","軟体動物（頭足類）","植物"],ans:2,ex:"アンモナイトはイカやタコに近い軟体動物（頭足類）です。巻き貝のような殻を持ちます。"},
      {q:"三葉虫が絶滅したのはいつ？",choices:["中生代の末","新生代の初め","古生代の末","現在も生きている"],ans:2,ex:"三葉虫は古生代の末（約2億5千万年前のペルム紀末）に起きた大量絶滅で消えました。"},
      {q:"古生代はおよそ何年前から何年前までか（近いものを選べ）",choices:["6600万年前まで","2億5千万年前まで","5億4千万年前〜2億5千万年前","1億年前まで"],ans:2,ex:"古生代は約5億4千万年前〜約2億5千万年前です。中生代は2億5千万〜6600万年前、新生代は6600万年前〜現在です。"},
      {q:"示相化石に向いている生物の条件は？",choices:["広い環境に適応できる","特定の環境にしか生きられない","絶滅している必要がある","大型である"],ans:1,ex:"示相化石には「特定の環境でしか生きられない」生物が適しています。現在も似た環境の生物と比較できると便利です。"},
      {q:"フズリナはどんな形をしている？",choices:["巻き貝型","紡錘（ぼうすい）型","三葉型","球形"],ans:1,ex:"フズリナは紡錘（ぼうすい）型（麦粒のような形）をした単細胞生物です。石灰質の殻を持ちます。"},

// ステージ9は全範囲から生成
function buildStage9() {
  const pool = [];
  // 地層30% → 6問, 地震25% → 5問, 火山岩石20% → 4問, プレート10% → 2問, 電流15% → 3問
  const picks = [[0,6],[2,5],[3,4],[4,2],[5,3]];
  picks.forEach(([si, n]) => {
    const qs = shuffle([...STAGES[si].questions]);
    pool.push(...qs.slice(0, n));
  });
  STAGES[8].questions = shuffle(pool).slice(0, 20);
}

// =============================================
// State
// =============================================
let currentStage = null;
let questions = [];
let qIndex = 0;
let score = 0;
let answered = false;
const clearedStages = new Set(JSON.parse(localStorage.getItem('clearedStages') || '[]'));

// =============================================
// Utils
// =============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  ['top-screen','quiz-screen','result-screen'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
}

// =============================================
// Top Screen
// =============================================
function renderTop() {
  const grid = document.getElementById('stage-grid');
  grid.innerHTML = '';
  STAGES.forEach((stage, i) => {
    const cleared = clearedStages.has(stage.id);
    const card = document.createElement('div');
    card.className = 'stage-card' + (cleared ? ' cleared' : '') + (stage.priority ? ' priority' : '');
    card.innerHTML = `
      <div class="stage-icon">${stage.icon}</div>
      <div class="stage-num">STAGE ${stage.id}</div>
      <div class="stage-name">${stage.name}</div>
      <div class="stage-count">20問 / クリア80%以上</div>
    `;
    card.onclick = () => startStage(i);
    grid.appendChild(card);
  });
}

// =============================================
// Quiz
// =============================================
function startStage(idx) {
  currentStage = idx;
  if (idx === 8) buildStage9();
  questions = shuffle([...STAGES[idx].questions]).slice(0, 20);
  qIndex = 0;
  score = 0;
  show('quiz-screen');
  document.getElementById('ql-stage').textContent = `STAGE ${STAGES[idx].id}`;
  document.getElementById('ql-title').textContent = STAGES[idx].name;
  renderQuestion();
}

function renderQuestion() {
  const q = questions[qIndex];
  answered = false;

  document.getElementById('q-counter').textContent = `問題 ${qIndex + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('ql-score').textContent = `${score} / ${qIndex}`;
  document.getElementById('prog-fill').style.width = `${(qIndex / questions.length) * 100}%`;

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  document.getElementById('next-btn').className = 'next-btn';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  // シャッフルして選択肢番号を保持
  const indices = shuffle([0,1,2,3]);
  indices.forEach(ci => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = q.choices[ci];
    btn.dataset.ci = ci;
    btn.onclick = () => selectAnswer(ci, q.ans, q.ex);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(selected, correct, explain) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(btn => {
    btn.disabled = true;
    const ci = parseInt(btn.dataset.ci);
    if (ci === correct) btn.classList.add('correct');
    else if (ci === selected) btn.classList.add('wrong');
  });

  const ok = selected === correct;
  if (ok) score++;

  const fb = document.getElementById('feedback-box');
  const fbRes = document.getElementById('fb-result');
  fbRes.textContent = ok ? '⭕ 正解！' : '❌ 不正解';
  fbRes.className = 'feedback-result ' + (ok ? 'ok' : 'ng');
  document.getElementById('fb-explain').textContent = explain;
  fb.className = 'feedback-box show';

  document.getElementById('next-btn').className = 'next-btn show';
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// =============================================
// Result
// =============================================
function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const cleared = pct >= 80;

  if (cleared) clearedStages.add(STAGES[currentStage].id);
  localStorage.setItem('clearedStages', JSON.stringify([...clearedStages]));

  show('result-screen');
  document.getElementById('res-emoji').textContent = cleared ? '🎉' : score >= 12 ? '😊' : '📚';
  document.getElementById('res-title').textContent = cleared ? 'クリア！' : 'もう少し！';
  document.getElementById('res-sub').textContent = `${STAGES[currentStage].name} ／ 正答率 ${pct}%`;
  document.getElementById('res-score-num').textContent = score;
  document.getElementById('res-score-denom').textContent = `/ ${questions.length}`;

  let msg = '';
  if (pct === 100) msg = '完璧です！全問正解！この単元は完璧です。';
  else if (cleared) msg = `${pct}%でクリア！よく頑張りました。間違えた問題を復習しておきましょう。`;
  else if (pct >= 60) msg = `${pct}%！あと少しでクリアです。もう一度チャレンジしてみましょう！`;
  else msg = `${pct}%でした。解説をよく読んで、もう一度チャレンジしてみてください。`;
  document.getElementById('res-msg').textContent = msg;
}

function retryStage() {
  startStage(currentStage);
}

function goTop() {
  renderTop();
  show('top-screen');
}

// =============================================
// Init
// =============================================
renderTop();
show('top-screen');
</script>
</body>
</html>
